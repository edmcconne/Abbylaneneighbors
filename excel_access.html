<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abby Lane Neighbors — Document Access</title>

<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    font-family: Arial, sans-serif;

    background: #0f1e2e;

    color: #f5f0e8;

    min-height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

    padding: 24px;

  }

  .card {

    background: #1a2e42;

    border: 1px solid #c9a84c;

    border-radius: 6px;

    padding: 40px 36px;

    max-width: 480px;

    width: 100%;

    text-align: center;

  }

  h1 { font-size: 1.4rem; color: #c9a84c; margin-bottom: 8px; }

  .subtitle { font-size: 0.9rem; color: #a09880; margin-bottom: 32px; }

  label { display: block; text-align: left; font-size: 0.85rem; color: #c9a84c; margin-bottom: 6px; }

  input[type="email"] {

    width: 100%;

    padding: 12px 14px;

    font-size: 1rem;

    background: #0f1e2e;

    border: 1px solid #c9a84c;

    border-radius: 4px;

    color: #f5f0e8;

    margin-bottom: 16px;

    outline: none;

  }

  input[type="email"]:focus { border-color: #e8c96a; }

  .btn {

    display: inline-block;

    background: #c9a84c;

    color: #0f1e2e;

    font-weight: bold;

    font-size: 0.95rem;

    padding: 12px 28px;

    border: none;

    border-radius: 4px;

    cursor: pointer;

    text-decoration: none;

    width: 100%;

  }

  .btn:hover { background: #e8c96a; }

  .result { margin-top: 28px; padding: 20px; border-radius: 4px; font-size: 0.95rem; line-height: 1.6; }

  .result.found { background: #1e3a28; border: 1px solid #2d6a4f; }

  .result.not-found { background: #2e1a1a; border: 1px solid #8b1a1a; }

  .result a { color: #c9a84c; }

  .divider { border: none; border-top: 1px solid #2a3f55; margin: 18px 0; }

</style>

</head>

<body>

<div class="card">

  <h1>Abby Lane Neighbors</h1>

  <p class="subtitle">Acknowledgment Document Access</p>



  <label for="email">Enter your email address</label>

  <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')lookup()">

  <button class="btn" onclick="lookup()">&#128269; Find My Form</button>



  <div id="result"></div>

</div>



<script>

var WORKBOOK_URL = "https://1drv.ms/x/c/f48a627c72e8b791/IQAn5qjUg9TuQrY0lbktdDsvATFkbYF3uLvus8kDPzDyVEs";

var OWNER_EMAIL = "abbylaneneighbors@gmail.com";



var USERS = [

  { email: "edmcconne@gmail.com",             tab: "Ed McConnell" },

  { email: "abbylaneneighbors@gmail.com",     tab: "EdView" },

  { email: "edext18@gmail.com",               tab: "EdExt" },

  { email: "ashley@collegiatesealers.com",    tab: "Ashley Rich Cornicello" },

  { email: "bcg3812@gmail.com",               tab: "Brenda Gilbert" },

  { email: "jcb@lawbreeden.com",              tab: "Jim Breeden" },

  { email: "ktmc@mail.com",                   tab: "Katie McConnell" },

  { email: "martinmo404@gmail.com",           tab: "Morris Martin" },

  { email: "rich@collegiatesealers.com",      tab: "Richard Cornicello" },

  { email: "baltirobin@gmail.com",            tab: "Robin Spence" },

  { email: "srmartin736@gmail.com",           tab: "Shirley Mo Martin" },

  { email: "splicer22@aol.com",               tab: "Bill and Merrill Noel" },

  { email: "spencelundie@gmail.com",          tab: "Spence Lundie" },

];



function lookup() {

  var input = document.getElementById("email").value.trim().toLowerCase();

  var resultEl = document.getElementById("result");



  if (!input) {

    resultEl.innerHTML = '<div class="result not-found">Please enter your email address.</div>';

    return;

  }



  var user = USERS.find(function(u) { return u.email === input; });



  if (user) {

    resultEl.innerHTML =

      '<div class="result found">' +

        '<div>&#10003; Email recognized. Your form is on the <strong>' + user.tab + '</strong> tab.</div>' +

        '<hr class="divider">' +

        '<p style="margin-bottom:14px;font-size:0.88rem;color:#a09880;">Click below to open the workbook, then select the <strong style="color:#c9a84c;">' + user.tab + '</strong> tab at the bottom of the screen.</p>' +

        '<a href="' + WORKBOOK_URL + '" target="_blank" class="btn">&#128279; Open Acknowledgment Workbook</a>' +

      '</div>';

  } else {

    var subject = encodeURIComponent("Document Access Request");

    var body = encodeURIComponent("Hi,\n\nI am trying to access the Abby Lane Neighbors acknowledgment document but my email address was not recognized.\n\nMy email: " + input + "\n\nPlease advise.");

    resultEl.innerHTML =

      '<div class="result not-found">' +

        '<div>&#10007; Email address not recognized.</div>' +

        '<hr class="divider">' +

        '<p style="margin-bottom:14px;font-size:0.88rem;color:#a09880;">If you believe this is an error, please contact the owner to be added to the access list.</p>' +

        '<a href="mailto:' + OWNER_EMAIL + '?subject=' + subject + '&body=' + body + '" class="btn">&#9993; Contact Owner</a>' +

      '</div>';

  }

}

</script>

</body>

</html
